<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>Qleno</title>
    <meta name="description" content="Cleaning operations software">
    <!-- Open Graph / Twitter — the SMS & iMessage link-preview card is built
         from THESE tags (the phone fetches the URL and reads them). Without an
         og:image, iOS falls back to the tiny apple-touch-icon, which is why the
         customer texts showed the bare icon instead of the Qleno brand. Absolute
         URLs are required: link scrapers can't resolve a relative image path. -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Qleno">
    <meta property="og:title" content="Qleno">
    <meta property="og:description" content="Cleaning operations software">
    <meta property="og:url" content="https://app.qleno.com/">
    <meta property="og:image" content="https://app.qleno.com/opengraph.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Qleno — Cleaning operations software">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Qleno">
    <meta name="twitter:description" content="Cleaning operations software">
    <meta name="twitter:image" content="https://app.qleno.com/opengraph.jpg">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" href="/images/logo-mark.png">
    <!-- iOS home-screen icon. Without this, iOS auto-generates an ugly "Q"
         letter tile instead of the Qleno logo. Users must re-add the app to
         the home screen (or iOS refreshes) to pick up the new icon. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0A0E1A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Qleno">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
