kind = "web"
previewPath = "/"
title = "Qleno"
version = "1.0.0"
id = "artifacts/qleno"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19325
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/qleno run dev"

[services.env]
PORT = "19325"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/qleno", "run", "build"]
run = "npx serve -s artifacts/qleno/dist/public -l ${PORT:-3000}"
